services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tickets}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tickets}",
        ]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      # Берётся из .env в каталоге compose (как и у `docker compose` для ${…}).
      # Если в .env нет DATABASE_URL — запасной URL на сервис db (те же дефолты, что у POSTGRES_*).
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/tickets}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
