# Alembic — миграции SQLAlchemy. URL БД задаётся в env.py из переменных окружения / .env.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Фактический URL подставляет env.py из настроек приложения.
# sqlalchemy.url =

[post_write_hooks]
# hooks = ruff-check, ruff-format

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
