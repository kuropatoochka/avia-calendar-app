name: frontend-ci

on:
  push:
    branches: ["develop", "feature/**"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

  pull_request:
    branches: ["main", "develop"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

  workflow_dispatch:

jobs:
  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build project
        run: npm run build